workflows:
  - name: checks
    step_customizations:
      - action: REPLACE
        job: lint-typing
        step_id: set-up-python-and-poetry-environment
        content:
          # Install extras so that usage of optional dependencies are also type checked
          - name: Set up Python & Poetry Environment
            id: set-up-python-and-poetry-environment
            uses: exasol/python-toolbox/.github/actions/python-environment@v8
            with:
              python-version: ${{ matrix.python-versions }}
              poetry-version: "2.3.0"
              extras: "all"
  - name: fast-tests
    step_customizations:
      - action: REPLACE
        job: run-unit-tests
        step_id: set-up-python-and-poetry-environment
        content:
          # Install extras so that unit tests for optional dependencies can run
          - name: Set up Python & Poetry Environment
            id: set-up-python-and-poetry-environment
            uses: exasol/python-toolbox/.github/actions/python-environment@v8
            with:
              python-version: ${{ matrix.python-versions }}
              poetry-version: "2.3.0"
              extras: "all"
