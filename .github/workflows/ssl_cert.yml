name: SSL certificate test

on:
  workflow_call:

jobs:
  build-matrix:
    name: Generate Build Matrix
    uses: ./.github/workflows/matrix.yml
    with:
      matrix_keys_json: '["exasol_versions", "minimum_python_version"]'
    permissions:
      contents: read

  ssl_cert:
    name: Build SSL-Cert (Python-${{ matrix.python_versions }}, Exasol-${{ matrix.exasol_versions}})
    needs: [ build-matrix ]
    # For all containers with versions 7.1.x and older versions 8.y.z of docker-db,
    # there will be a crash if UDFs (User Defined Functions) are utilized.
    runs-on:  ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python_versions: ${{ fromJson(needs.build-matrix.outputs.matrix).minimum_python_version }}
        exasol_versions: ${{ fromJson(needs.build-matrix.outputs.matrix).exasol_versions }}
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python & Poetry Environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v10
        with:
          python-version: ${{ matrix.python_versions }}
          poetry-version: "2.3.0"
          extras: "all"

      - name: Start test db
        run: poetry run -- nox -s db:start -- --db-version ${MATRIX_EXASOL_VERSIONS} --with-certificate
        env:
          MATRIX_EXASOL_VERSIONS: ${{ matrix.exasol_versions }}

      - name: Pull certificate from container
        run: docker cp db_container_test:/certificates/rootCA.crt .

      - name: Set up custom host
        run: echo "127.0.0.1 exasol-test-database" | sudo tee -a /etc/hosts

      - name: Run test
        run: poetry run -- python examples/_ssl_test.py

      - name: Stop test db
        run: poetry run -- nox -s db:stop
