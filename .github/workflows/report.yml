# Generated and maintained by the exasol-toolbox.
# Last generated with exasol-toolbox version 9.0.0.
name: Status Report

on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: true

jobs:

  report:
    runs-on: "ubuntu-24.04"
    permissions:
      contents: read
    steps:
      - name: Check out Repository
        id: check-out-repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python & Poetry Environment
        id: set-up-python-and-poetry-environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v9
        with:
          python-version: "3.10"
          poetry-version: "2.3.0"

      - name: Download Artifacts
        id: download-artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Copy Artifacts into Root Folder
        id: copy-artifacts-into-root-folder
        run: poetry run -- nox -s artifacts:copy -- artifacts

      - name: Validate Artifacts
        id: validate-artifacts
        run: poetry run -- nox -s artifacts:validate

      - name: Upload to Sonar
        id: upload-to-sonar
        env:
          SONAR_TOKEN: "${{ secrets.SONAR_TOKEN }}"
        run: poetry run -- nox -s sonar:check

      - name: Generate GitHub Summary
        id: generate-github-summary
        run: |-
          echo -e "# Summary\n" >> $GITHUB_STEP_SUMMARY
          poetry run -- nox -s dependency:licenses >> $GITHUB_STEP_SUMMARY
